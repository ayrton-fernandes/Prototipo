variables:
  GIT_DEPTH: "0"
  CI_REGISTRY: "$GITLAB_URL:5050"
  API_IMAGE: "$CI_REGISTRY/$CI_PROJECT_NAMESPACE/$CI_PROJECT_NAME/$CI_COMMIT_REF_NAME"

stages:
  - build
  - sonar
  - build-image

default:
  tags:
    - runner-docker

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_REF_PROTECTED == "true" && $CI_COMMIT_REF_NAME =~ /^(dev|homolog|main)$/'
    - when: never

build:
  stage: build
  image: node:22.11.0-alpine
  cache:
    key: "npm-$CI_COMMIT_REF_SLUG"
    paths:
      - .npm/
  script:
    - npm ci --cache .npm --prefer-offline --ignore-scripts
    - npm run build
  artifacts:
    paths:
      - app/
      - components/
      - config/
      - context/
      - domain/
      - hooks/
      - public/
      - services/
      - store/
      - styles/
      - utils/
      - package.json
      - package-lock.json
      - Dockerfile
      - next.config.ts
    expire_in: 1 hour

sonar:
  stage: sonar
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true" && $CI_COMMIT_REF_NAME =~ /^(dev|homolog|main)$/'
  script:
    - '[ -n "$SONAR_HOST_URL" ] || exit 1'
    - '[ -n "$SONAR_TOKEN" ] || exit 1'
    - |
      SONAR_BASE_PROJECT_KEY="cpo-digital-app"
      if [ "$CI_COMMIT_REF_NAME" = "main" ]; then
        SONAR_PROJECT_KEY="$SONAR_BASE_PROJECT_KEY"
      else
        SONAR_PROJECT_KEY="${SONAR_BASE_PROJECT_KEY}-${CI_COMMIT_REF_SLUG}"
      fi
      sonar-scanner \
        -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
        -Dsonar.projectName="SETD-$SONAR_PROJECT_KEY" \
        -Dsonar.host.url="$SONAR_HOST_URL" \
        -Dsonar.token="$SONAR_TOKEN" \
        -Dsonar.sources="app,components,config,context,domain,hooks,services,store,styles,utils"

build-image:
  stage: build-image
  needs:
    - build
    - sonar
  rules:
    - if: '$CI_COMMIT_REF_NAME =~ /^(dev|homolog|main)$/'
  before_script:
    - docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - |
      case "$CI_COMMIT_REF_NAME" in
        dev) cp "$ENV_FILE_DEV" .env ;;
        homolog) cp "$ENV_FILE_HOMOLOG" .env ;;
        main) cp "$ENV_FILE_PROD" .env ;;
      esac
  script:
    - docker build -f Dockerfile -t "$API_IMAGE:$CI_COMMIT_SHA" -t "$API_IMAGE:latest" .
    - docker push "$API_IMAGE:$CI_COMMIT_SHA"
    - docker push "$API_IMAGE:latest"
  after_script:
    - rm -f .env